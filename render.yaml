# Render Blueprint — the four NestJS services.
# Apply once (Render dashboard → New → Blueprint → this repo).
# autoDeployTrigger is "off": Render never deploys on its own. The gated CI
# deploy-backends job (.github/workflows/ci.yml) is the SOLE deploy trigger,
# via the Render API after every gate passes. The two Vite apps deploy the same
# way on Vercel. Database URLs are secrets: set them in the dashboard when
# prompted (sync: false), using the values from each service's local .env.
services:
  - type: web
    name: arena-pricing
    runtime: node
    plan: free
    buildCommand: npm install -g npm@11 && npm ci && npm run build -w services/pricing
    startCommand: npm run start:prod -w services/pricing
    healthCheckPath: /health
    autoDeployTrigger: 'off'
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: PRICING_DATABASE_URL
        sync: false

  - type: web
    name: arena-betting
    runtime: node
    plan: free
    buildCommand: npm install -g npm@11 && npm ci && npm run build -w services/betting
    startCommand: npm run start:prod -w services/betting
    healthCheckPath: /health
    autoDeployTrigger: 'off'
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: BETTING_DATABASE_URL
        sync: false
      # Auth (pre-built): passwordless email + OTP → session tokens
      - key: SESSION_SECRET # HMAC key for signing session tokens (shared via @arena/service-auth)
        sync: false
      - key: ADMIN_EMAILS # allowlist stamped as the `admin` claim at login (identity-based admin)
        value: marcio.sete@gmail.com
      - key: PRICING_URL # bet-time price check → pricing
        value: https://pricing.hackathon.beer
      - key: RESEND_API_KEY # transactional email (OTP codes)
        sync: false
      - key: RESEND_FROM # verified sender, e.g. hello@mail.hackathon.beer
        sync: false

  - type: web
    name: arena-simulator
    runtime: node
    plan: free
    buildCommand: npm install -g npm@11 && npm ci && npm run build -w services/simulator
    startCommand: npm run start:prod -w services/simulator
    healthCheckPath: /health
    autoDeployTrigger: 'off'
    envVars:
      - key: NODE_VERSION
        value: '22'
      # Mints admin service tokens (signToken('simulator',{admin:true})) to reprice/settle/reset.
      - key: SESSION_SECRET
        sync: false
      # The finale + Reset-bracket cascade fan out to these (localhost fallback is dev-only).
      - key: PRICING_URL
        value: https://pricing.hackathon.beer
      - key: BETTING_URL
        value: https://betting.hackathon.beer

  - type: web
    name: arena-flags
    runtime: node
    plan: free
    buildCommand: npm install -g npm@11 && npm ci && npm run build -w services/flags
    startCommand: npm run start:prod -w services/flags
    healthCheckPath: /health
    autoDeployTrigger: 'off'
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: FLAGS_DATABASE_URL
        sync: false
      # Verifies session tokens (incl. the admin claim on PUT /flags/:key).
      - key: SESSION_SECRET
        sync: false
