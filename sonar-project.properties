# SonarQube Cloud — SINGLE monorepo project (CI-based analysis).
# Runs from GitHub Actions against https://sonarcloud.io (org: marciosete).
#
# NOTE: the self-hosted, per-workspace setup is separate and untouched — each
# workspace has its own sonar-project.properties, and scripts/sonar.sh scans by
# cd-ing into a workspace, so this root file never affects the local flow.
sonar.projectKey=marciosete_agent-arena
sonar.organization=marciosete
sonar.projectName=Agent Arena

# Analyse src across every workspace (mirrors the 8 per-workspace projects).
sonar.sources=\
  apps/punter-web/src,\
  apps/trader-ops/src,\
  services/betting/src,\
  services/flags/src,\
  services/pricing/src,\
  services/simulator/src,\
  contracts/src,\
  bots/src
sonar.sourceEncoding=UTF-8

# Tests stay in analysis but are classified as test code (not main).
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/*.d.ts

# Kept in analysis, dropped from the coverage denominator: build/test tooling,
# type-only modules, generated clients, DB schema/migrations, and entry/bootstrap.
sonar.coverage.exclusions=\
  **/*.config.ts,\
  **/*.config.mjs,\
  **/*.config.cjs,\
  **/*.config.js,\
  **/*.d.ts,\
  **/types.ts,\
  **/types/**,\
  **/generated/**,\
  **/prisma/**,\
  **/migrations/**,\
  **/*.sql,\
  **/main.ts,\
  **/main.tsx,\
  **/index.ts,\
  **/vite-env.d.ts

# One lcov per workspace. CI rewrites the SF: paths to be repo-root-relative
# first (see .github/workflows/ci.yml → "Rewrite lcov paths"), because vitest
# emits workspace-relative paths that a root-level single project can't map.
sonar.javascript.lcov.reportPaths=\
  apps/punter-web/coverage/lcov.info,\
  apps/trader-ops/coverage/lcov.info,\
  services/betting/coverage/lcov.info,\
  services/flags/coverage/lcov.info,\
  services/pricing/coverage/lcov.info,\
  services/simulator/coverage/lcov.info,\
  contracts/coverage/lcov.info,\
  bots/coverage/lcov.info
