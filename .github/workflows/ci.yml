name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Parallel gate lanes — each self-contained so they run concurrently.
# Deploy jobs fan in on every gate; nothing ships unless all are green.
jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run typecheck

  architecture:
    name: Architecture & Duplication
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run check:architecture
      - run: npm run check:duplicates

  test:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run build

  yaml:
    name: YAML Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - run: pip install yamllint
      - run: yamllint .

  sonar:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run test:coverage

      # Single monorepo project on SonarCloud needs repo-root-relative coverage
      # paths; vitest emits workspace-relative ones (SF:src/...).
      - name: Rewrite lcov paths to repo-root (SonarCloud monorepo)
        run: |
          for ws in apps/punter-web apps/trader-ops services/betting services/flags \
                    services/pricing services/simulator contracts bots; do
            f="$ws/coverage/lcov.info"
            if [ -f "$f" ]; then sed -i "s#^SF:#SF:$ws/#" "$f"; fi
          done

      # Blocking: qualitygate.wait fails the job (and gates deploy) if the
      # SonarCloud quality gate fails. Config lives in ./sonar-project.properties.
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Dependabot runs carry a read-only token that gitleaks-action can't use
    # (403 Resource not accessible). Bot bumps don't need secret scanning;
    # human PRs and every push to main still get scanned.
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy: gated on ALL lanes, main pushes only ──────────────────────────
  # Vercel git auto-deploy is disabled (apps/*/vercel.json) and Render
  # auto-deploy is off — these two jobs are the sole path to production, so
  # "no green, no deploy" is enforced by the pipeline, not by each platform.
  deploy-frontends:
    name: Deploy Frontends (Vercel)
    runs-on: ubuntu-latest
    needs: [lint-format, typecheck, architecture, test, yaml, sonar, secrets]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_6l5x9txAMxriUA8f67Ilkox1
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Skip notice (no VERCEL_TOKEN secret yet)
        if: env.VERCEL_TOKEN == ''
        run: echo "VERCEL_TOKEN secret not configured — skipping frontend deploys."

      - name: Use npm 11 (lockfile is written by npm 11)
        if: env.VERCEL_TOKEN != ''
        run: npm install -g npm@11

      # Install here, where it provably works (same as the test job):
      # postinstall compiles contracts and generates the prisma clients.
      # Vercel's own install phase is configured as a script-less no-op.
      - name: Install Dependencies
        if: env.VERCEL_TOKEN != ''
        run: npm ci

      # Prebuilt pattern: build in THIS runner (the same env the gates just
      # proved green), upload only the output — no remote build to go wrong.
      - name: Build & deploy punter-web
        if: env.VERCEL_TOKEN != ''
        env:
          VERCEL_PROJECT_ID: prj_YKTWnj59IvAXUaVowdoJLr8qaIlk
        run: |
          rm -rf .vercel
          npx vercel@48 pull --yes --environment=production --token "$VERCEL_TOKEN"
          npx vercel@48 build --prod --yes --token "$VERCEL_TOKEN"
          npx vercel@48 deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"

      - name: Build & deploy trader-ops
        if: env.VERCEL_TOKEN != ''
        env:
          VERCEL_PROJECT_ID: prj_LuT4YqcHQ6BneNBHh3mD7kwgajbC
        run: |
          rm -rf .vercel
          npx vercel@48 pull --yes --environment=production --token "$VERCEL_TOKEN"
          npx vercel@48 build --prod --yes --token "$VERCEL_TOKEN"
          npx vercel@48 deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"

  deploy-backends:
    name: Deploy Backends (Render)
    runs-on: ubuntu-latest
    needs: [lint-format, typecheck, architecture, test, yaml, sonar, secrets]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
    steps:
      - name: Skip notice (no RENDER_API_KEY secret yet)
        if: env.RENDER_API_KEY == ''
        run: echo "RENDER_API_KEY secret not configured — skipping backend deploys."

      # Render auto-deploy is off; the pipeline is the gate. Trigger a deploy of
      # the just-verified commit for each service and wait until it goes live.
      - name: Trigger & await Render deploys
        if: env.RENDER_API_KEY != ''
        run: |
          set -euo pipefail
          services="pricing:srv-d92rdbtaeets73aht15g betting:srv-d92rdbtaeets73aht170 simulator:srv-d92rdbtaeets73aht190 flags:srv-d92rdbtaeets73aht1a0"
          deploys=""
          for entry in $services; do
            name="${entry%%:*}"; id="${entry#*:}"
            dep=$(curl -sf -X POST "https://api.render.com/v1/services/$id/deploys" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" -d "{\"commitId\": \"$GITHUB_SHA\"}" \
              | jq -r '.id')
            echo "$name: triggered deploy $dep"
            deploys="$deploys $name:$id:$dep"
          done
          fail=0
          for entry in $deploys; do
            name="${entry%%:*}"; rest="${entry#*:}"; id="${rest%%:*}"; dep="${rest#*:}"
            for _ in $(seq 1 60); do
              st=$(curl -sf "https://api.render.com/v1/services/$id/deploys/$dep" \
                -H "Authorization: Bearer $RENDER_API_KEY" | jq -r '.status')
              case "$st" in
                live) echo "$name: live"; break;;
                build_failed|update_failed|canceled|pre_deploy_failed)
                  echo "$name: FAILED ($st)"; fail=1; break;;
                *) sleep 10;;
              esac
            done
          done
          exit $fail
