name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Use npm 11 (lockfile is written by npm 11)
        run: npm install -g npm@11

      - name: Install Dependencies
        run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint

      - name: YAML Lint
        run: |
          pip install yamllint
          yamllint .

      - name: Format Check
        run: npm run format:check

      - name: Architecture Boundaries (dependency-cruiser)
        run: npm run check:architecture

      - name: Typecheck All Workspaces
        run: npm run typecheck

      - name: Test With Coverage
        run: npm run test:coverage

      - name: Build All Workspaces
        run: npm run build

      - name: Duplication Check
        run: npm run check:duplicates

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deploy is GATED: only after quality + secret gates are green, only on main.
  # Vercel's own git auto-deploy is disabled (apps/*/vercel.json) — this job is
  # the sole path to production for the frontends. Render services gate
  # themselves on these same checks via autoDeployTrigger: checksPass.
  deploy:
    name: Deploy Frontends (Vercel)
    runs-on: ubuntu-latest
    needs: [quality, secrets]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_6l5x9txAMxriUA8f67Ilkox1
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Skip notice (no VERCEL_TOKEN secret yet)
        if: env.VERCEL_TOKEN == ''
        run: echo "VERCEL_TOKEN secret not configured — skipping frontend deploys."

      - name: Deploy punter-web
        if: env.VERCEL_TOKEN != ''
        env:
          VERCEL_PROJECT_ID: prj_YKTWnj59IvAXUaVowdoJLr8qaIlk
        run: npx vercel@48 deploy --prod --yes --token "$VERCEL_TOKEN"

      - name: Deploy trader-ops
        if: env.VERCEL_TOKEN != ''
        env:
          VERCEL_PROJECT_ID: prj_LuT4YqcHQ6BneNBHh3mD7kwgajbC
        run: npx vercel@48 deploy --prod --yes --token "$VERCEL_TOKEN"
