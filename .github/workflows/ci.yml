name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Parallel gate lanes — each self-contained so they run concurrently.
# Deploy jobs fan in on every gate; nothing ships unless all are green.
jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run typecheck

  architecture:
    name: Architecture & Duplication
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run check:architecture
      - run: npm run check:duplicates

  test:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run build

  yaml:
    name: YAML Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - run: pip install yamllint
      - run: yamllint .

  sonar:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run test:coverage

      # Single monorepo project on SonarCloud needs repo-root-relative coverage
      # paths; vitest emits workspace-relative ones (SF:src/...).
      - name: Rewrite lcov paths to repo-root (SonarCloud monorepo)
        run: |
          for ws in apps/punter-web apps/trader-ops services/betting services/flags \
                    services/pricing services/simulator contracts bots; do
            f="$ws/coverage/lcov.info"
            if [ -f "$f" ]; then sed -i "s#^SF:#SF:$ws/#" "$f"; fi
          done

      # Blocking: qualitygate.wait fails the job (and gates deploy) if the
      # SonarCloud quality gate fails. Config lives in ./sonar-project.properties.
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Dependabot runs carry a read-only token that gitleaks-action can't use
    # (403 Resource not accessible). Bot bumps don't need secret scanning;
    # human PRs and every push to main still get scanned.
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy: six independent services, each gated on ALL lanes, main only ──
  # Vercel git auto-deploy is disabled (apps/*/vercel.json) and Render
  # auto-deploy is off — these jobs are the sole path to production, so
  # "no green, no deploy" is enforced by the pipeline. One matrix leg per
  # service: independent nodes, parallel, independently retryable.
  deploy-frontend:
    name: Deploy ${{ matrix.app.name }} (Vercel)
    runs-on: ubuntu-latest
    needs: [lint-format, typecheck, architecture, test, yaml, sonar, secrets]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        app:
          - { name: punter-web, projectId: prj_YKTWnj59IvAXUaVowdoJLr8qaIlk }
          - { name: trader-ops, projectId: prj_LuT4YqcHQ6BneNBHh3mD7kwgajbC }
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_6l5x9txAMxriUA8f67Ilkox1
      VERCEL_PROJECT_ID: ${{ matrix.app.projectId }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Skip notice (no VERCEL_TOKEN secret)
        if: env.VERCEL_TOKEN == ''
        run: echo "VERCEL_TOKEN not configured — skipping ${{ matrix.app.name }} deploy."

      - name: Use npm 11 (lockfile is written by npm 11)
        if: env.VERCEL_TOKEN != ''
        run: npm install -g npm@11

      # Install here, where it provably works (same as the test job):
      # postinstall compiles contracts and generates the prisma clients.
      # Vercel's own install phase is configured as a script-less no-op.
      - name: Install dependencies
        if: env.VERCEL_TOKEN != ''
        run: npm ci

      # Prebuilt pattern: build in THIS runner (the same env the gates just
      # proved green), upload only the output — no remote build to go wrong.
      - name: Build & deploy ${{ matrix.app.name }}
        if: env.VERCEL_TOKEN != ''
        run: |
          rm -rf .vercel
          npx vercel@48 pull --yes --environment=production --token "$VERCEL_TOKEN"
          npx vercel@48 build --prod --yes --token "$VERCEL_TOKEN"
          npx vercel@48 deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"

  deploy-backend:
    name: Deploy ${{ matrix.svc.name }} (Render)
    runs-on: ubuntu-latest
    needs: [lint-format, typecheck, architecture, test, yaml, sonar, secrets]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        svc:
          - { name: pricing, id: srv-d92rdbtaeets73aht15g }
          - { name: betting, id: srv-d92rdbtaeets73aht170 }
          - { name: simulator, id: srv-d92rdbtaeets73aht190 }
          - { name: flags, id: srv-d92rdbtaeets73aht1a0 }
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      SERVICE_ID: ${{ matrix.svc.id }}
      SERVICE_NAME: ${{ matrix.svc.name }}
    steps:
      - name: Skip notice (no RENDER_API_KEY secret)
        if: env.RENDER_API_KEY == ''
        run: echo "RENDER_API_KEY not configured — skipping ${{ matrix.svc.name }} deploy."

      # Render auto-deploy is off; the pipeline is the gate. Trigger a deploy of
      # the just-verified commit and wait until it reports live.
      - name: Trigger & await Render deploy
        if: env.RENDER_API_KEY != ''
        run: |
          set -euo pipefail
          dep=$(curl -sf -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" -d "{\"commitId\": \"$GITHUB_SHA\"}" \
            | jq -r '.id')
          echo "$SERVICE_NAME: triggered deploy $dep"
          for _ in $(seq 1 90); do
            st=$(curl -sf "https://api.render.com/v1/services/$SERVICE_ID/deploys/$dep" \
              -H "Authorization: Bearer $RENDER_API_KEY" | jq -r '.status')
            case "$st" in
              live) echo "$SERVICE_NAME: live"; exit 0;;
              build_failed|update_failed|canceled|pre_deploy_failed)
                echo "$SERVICE_NAME: FAILED ($st)"; exit 1;;
              *) sleep 10;;
            esac
          done
          echo "$SERVICE_NAME: timed out waiting for live"; exit 1
