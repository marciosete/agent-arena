name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Use npm 11 (lockfile is written by npm 11)
        run: npm install -g npm@11

      - name: Install Dependencies
        run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint

      - name: YAML Lint
        run: |
          pip install yamllint
          yamllint .

      - name: Format Check
        run: npm run format:check

      - name: Architecture Boundaries (dependency-cruiser)
        run: npm run check:architecture

      - name: Typecheck All Workspaces
        run: npm run typecheck

      - name: Test With Coverage
        run: npm run test:coverage

      - name: Build All Workspaces
        run: npm run build

      - name: Duplication Check
        run: npm run check:duplicates

      # Single monorepo project on SonarCloud needs repo-root-relative coverage
      # paths; vitest emits workspace-relative ones (SF:src/...).
      - name: Rewrite lcov paths to repo-root (SonarCloud monorepo)
        run: |
          for ws in apps/punter-web apps/trader-ops services/betting services/flags \
                    services/pricing services/simulator contracts bots; do
            f="$ws/coverage/lcov.info"
            if [ -f "$f" ]; then sed -i "s#^SF:#SF:$ws/#" "$f"; fi
          done

      # Blocking: qualitygate.wait fails the job (and gates deploy) if the
      # SonarCloud quality gate fails. Config lives in ./sonar-project.properties.
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Dependabot runs carry a read-only token that gitleaks-action can't use
    # (403 Resource not accessible). Bot bumps don't need secret scanning;
    # human PRs and every push to main still get scanned.
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deploy is GATED: only after quality + secret gates are green, only on main.
  # Vercel's own git auto-deploy is disabled (apps/*/vercel.json) — this job is
  # the sole path to production for the frontends. Render services gate
  # themselves on these same checks via autoDeployTrigger: checksPass.
  deploy:
    name: Deploy Frontends (Vercel)
    runs-on: ubuntu-latest
    needs: [quality, secrets]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_6l5x9txAMxriUA8f67Ilkox1
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Skip notice (no VERCEL_TOKEN secret yet)
        if: env.VERCEL_TOKEN == ''
        run: echo "VERCEL_TOKEN secret not configured — skipping frontend deploys."

      - name: Use npm 11 (lockfile is written by npm 11)
        if: env.VERCEL_TOKEN != ''
        run: npm install -g npm@11

      # Install here, where it provably works (same as the quality job):
      # postinstall compiles contracts and generates the prisma clients.
      # Vercel's own install phase is configured as a script-less no-op.
      - name: Install Dependencies
        if: env.VERCEL_TOKEN != ''
        run: npm ci

      # Prebuilt pattern: build in THIS runner (same env the quality job just
      # proved green), upload only the output — no remote build to go wrong.
      - name: Build & deploy punter-web
        if: env.VERCEL_TOKEN != ''
        env:
          VERCEL_PROJECT_ID: prj_YKTWnj59IvAXUaVowdoJLr8qaIlk
        run: |
          rm -rf .vercel
          npx vercel@48 pull --yes --environment=production --token "$VERCEL_TOKEN"
          npx vercel@48 build --prod --yes --token "$VERCEL_TOKEN"
          npx vercel@48 deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"

      - name: Build & deploy trader-ops
        if: env.VERCEL_TOKEN != ''
        env:
          VERCEL_PROJECT_ID: prj_LuT4YqcHQ6BneNBHh3mD7kwgajbC
        run: |
          rm -rf .vercel
          npx vercel@48 pull --yes --environment=production --token "$VERCEL_TOKEN"
          npx vercel@48 build --prod --yes --token "$VERCEL_TOKEN"
          npx vercel@48 deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"
