sonar.projectKey=service-auth
sonar.projectName=service-auth

sonar.sources=src
sonar.sourceEncoding=UTF-8

# Tests stay in analysis but are classified as test code (not main).
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/*.d.ts

# Kept in analysis, dropped from the coverage denominator: build/test tooling,
# type-only modules, and framework entry/bootstrap files (no testable logic).
sonar.coverage.exclusions=\
  **/*.config.ts,\
  **/*.d.ts,\
  **/types.ts,\
  **/types/**,\
  src/index.ts,\
  src/main.ts,\
  src/main.tsx,\
  src/vite-env.d.ts

# vitest (v8) writes this when the 'lcov' reporter is enabled.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
